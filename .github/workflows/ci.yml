name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  go-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ui/go.mod
      - run: go test ./...

  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          # imagemagick → `identify` (Linux substitute for macOS `sips`, L1 dim read)
          # libimage-exiftool-perl → `exiftool` (L2 EXIF clustering / L3 embedded thumb)
          sudo apt-get install -y -qq jq ffmpeg imagemagick libimage-exiftool-perl
      - name: Install Python deps
        run: pip3 install --break-system-packages pillow imagehash
      - name: Run shell test suites
        run: |
          bash tests/events_contract.sh
          bash tests/p1_stage9_smoke.sh
          bash tests/p0_smoke.sh
          bash tests/p1_thumb_phash_smoke.sh
          bash tests/p1_thumb_smoke.sh
