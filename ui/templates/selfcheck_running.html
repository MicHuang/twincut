<section class="tab-section">
  <header class="tab-section-header">
    <h2>{{if .IsApply}}Applying…{{else}}Previewing…{{end}}</h2>
    <p class="subtitle"><code>{{.Folder}}</code></p>
  </header>

  <div class="run-panel" id="run-panel" data-run-id="{{.RunID}}" data-is-apply="{{.IsApply}}">

    <div class="progress">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-stats">
        <span id="progress-text">Starting…</span>
        <span class="muted" id="progress-current"></span>
      </div>
    </div>

    <div class="run-counters">
      <div class="counter">
        <span class="counter-label">duplicates found</span>
        <span class="counter-value" id="counter-dups">0</span>
      </div>
      <div class="counter">
        <span class="counter-label">warnings</span>
        <span class="counter-value" id="counter-warns">0</span>
      </div>
    </div>

    <details class="log-panel">
      <summary>Show log</summary>
      <pre class="log-pre" id="log-pre"></pre>
    </details>

    <div class="form-actions">
      <button type="button" class="btn btn-tertiary"
              hx-post="/api/runs/{{.RunID}}/cancel"
              hx-swap="none">Cancel</button>
      <a href="#" class="btn btn-secondary" hx-get="/tab/self-check" hx-target="#tab-content">Back to form</a>
    </div>

  </div>
</section>

<script>
  (function () {
    const panel = document.getElementById('run-panel');
    const runID = panel.dataset.runId;
    const isApply = panel.dataset.isApply === 'true';
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const progressCurrent = document.getElementById('progress-current');
    const dupsEl = document.getElementById('counter-dups');
    const warnsEl = document.getElementById('counter-warns');
    const logEl = document.getElementById('log-pre');

    let dups = 0, warns = 0;

    const es = new EventSource('/sse/' + runID);
    es.addEventListener('progress', (e) => {
      const p = JSON.parse(e.data);
      if (p.total > 0) {
        const pct = Math.min(100, Math.round((p.done / p.total) * 100));
        progressFill.style.width = pct + '%';
        progressText.textContent = `${p.phase}: ${p.done.toLocaleString()} / ${p.total.toLocaleString()} (${pct}%)`;
      } else {
        progressText.textContent = `${p.phase}: ${p.done.toLocaleString()}`;
      }
      if (p.current_path) {
        progressCurrent.textContent = p.current_path.split('/').slice(-2).join('/');
      }
    });
    es.addEventListener('dup_group', () => { dups++; dupsEl.textContent = dups; });
    es.addEventListener('action', (e) => {
      if (isApply) {
        const p = JSON.parse(e.data);
        logEl.textContent += `${p.kind} ${p.src}\n`;
      }
    });
    es.addEventListener('warn', () => { warns++; warnsEl.textContent = warns; });
    es.addEventListener('error', (e) => {
      const p = JSON.parse(e.data);
      logEl.textContent += `ERROR: ${p.code} ${p.detail}\n`;
      progressText.textContent = 'Error';
    });
    es.addEventListener('run_end', (e) => {
      const p = JSON.parse(e.data);
      es.close();
      progressFill.style.width = '100%';
      // Hand off: GET the appropriate next-screen fragment.
      const next = isApply ? `/api/self-check/done/${runID}` : `/api/self-check/results/${runID}`;
      htmx.ajax('GET', next, { target: '#tab-content', swap: 'innerHTML' });
    });
    es.onerror = () => {
      // EventSource auto-reconnects on transient errors; only log on hard close.
      if (es.readyState === EventSource.CLOSED) {
        progressText.textContent += ' (stream closed)';
      }
    };
  })();
</script>
