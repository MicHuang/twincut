<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>twincut</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="app-title">twincut</div>
      <div class="app-header-spacer"></div>
      <div class="app-status" title="Server status">● ready</div>
    </header>

    <aside class="app-sidebar">
      <nav>
        <a href="#" class="nav-item active" hx-get="/tab/self-check" hx-target="#tab-content" hx-swap="innerHTML">
          Self-check
        </a>
        <a href="#" class="nav-item disabled" title="Coming in stage 7">
          Cross-check <span class="muted-tag">soon</span>
        </a>
        <hr>
        <a href="#" class="nav-item disabled" title="Coming in stage 6">
          History <span class="muted-tag">soon</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <p class="muted">stage 4</p>
      </div>
    </aside>

    <main class="app-main" id="tab-content">
      {{template "selfcheck_form.html" .}}
    </main>
  </div>

  <script>
    // Sidebar tab highlighting on htmx swap
    document.body.addEventListener('htmx:afterRequest', (e) => {
      if (e.target.classList && e.target.classList.contains('nav-item')) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        e.target.classList.add('active');
      }
    });
  </script>
</body>
</html>
